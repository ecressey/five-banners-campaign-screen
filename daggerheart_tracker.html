<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Five Banners Burning — Campaign Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c0a;
    --bg-card: #151210;
    --bg-card-hover: #1a1714;
    --bg-detail: #111009;
    --border: rgba(180,150,90,0.15);
    --border-hover: rgba(180,150,90,0.3);
    --gold: #c9a84c;
    --gold-dim: #8a6e2e;
    --gold-bright: #e8c96a;
    --text-primary: #e8dfc8;
    --text-secondary: #9a8f7a;
    --text-muted: #5a5245;
    --red: #8b2a2a;
    --red-bright: #c94040;
    --fear-fill: #7a3ab5;
    --fear-danger: #8b2a2a;
    --progress-track: rgba(180,150,90,0.08);
    --font-display: 'Cinzel', serif;
    --font-body: 'Crimson Pro', serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(120,80,20,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(80,40,120,0.05) 0%, transparent 60%);
  }

  .app {
    max-width: 760px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 80px;
    height: 1px;
    background: var(--gold);
    opacity: 0.6;
  }

  .header-eyebrow {
    font-family: var(--font-display);
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  h1 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.05em;
  }

  .header-sub {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 4px;
    font-style: italic;
  }

  .section-label {
    font-family: var(--font-display);
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* FEAR TRACKER */
  .fear-section { margin-bottom: 2.5rem; }

  .fear-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .fear-left { min-width: 100px; }

  .fear-title {
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .fear-value-display {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }

  .fear-number {
    font-family: var(--font-display);
    font-size: 36px;
    font-weight: 600;
    color: var(--gold);
    line-height: 1;
    transition: color 0.3s;
  }

  .fear-number.danger { color: var(--red-bright); }

  .fear-denom {
    font-size: 14px;
    color: var(--text-muted);
  }

  .fear-pips {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }

  .fear-pip {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1px solid rgba(180,150,90,0.2);
    background: rgba(180,150,90,0.04);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    position: relative;
  }

  .fear-pip:hover { transform: scale(1.15); border-color: rgba(180,150,90,0.5); }
  .fear-pip.filled { background: var(--fear-fill); border-color: #9b5dd4; }
  .fear-pip.danger-fill { background: var(--fear-danger); border-color: #c94040; }

  .fear-pip-9 { border-color: rgba(200,60,60,0.3); }

  .fear-btns {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .ctrl-btn {
    width: 32px;
    height: 32px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: rgba(180,150,90,0.05);
    color: var(--gold);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    transition: background 0.1s, border-color 0.1s;
    line-height: 1;
  }

  .ctrl-btn:hover { background: rgba(180,150,90,0.12); border-color: var(--gold-dim); }
  .ctrl-btn:active { transform: scale(0.95); }

  /* FACTION CARDS */
  .factions-section { }
  .factions-list { display: flex; flex-direction: column; gap: 8px; }

  .faction-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .faction-card:hover { border-color: var(--border-hover); }

  .faction-header {
    display: flex;
    align-items: center;
    gap: 0;
    cursor: pointer;
    user-select: none;
  }

  .faction-sigil {
    width: 5px;
    align-self: stretch;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }

  .faction-main {
    flex: 1;
    padding: 12px 14px;
    min-width: 0;
  }

  .faction-name {
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--gold);
    margin-bottom: 3px;
  }

  .faction-short {
    font-size: 13px;
    color: var(--text-secondary);
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
  }

  .faction-right {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    flex-shrink: 0;
  }

  .step-counter {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .step-num-display {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 500;
    color: var(--text-primary);
    min-width: 22px;
    text-align: center;
    line-height: 1;
  }

  .step-of {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    text-align: center;
  }

  .step-ctrl {
    width: 26px;
    height: 26px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: rgba(180,150,90,0.04);
    color: var(--text-secondary);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
    flex-shrink: 0;
  }

  .step-ctrl:hover { background: rgba(180,150,90,0.1); color: var(--gold); border-color: var(--gold-dim); }
  .step-ctrl:active { transform: scale(0.92); }

  .expand-toggle {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 12px;
    transition: transform 0.25s, color 0.15s;
    flex-shrink: 0;
  }

  .expand-toggle.open { transform: rotate(180deg); color: var(--gold-dim); }

  .progress-track {
    height: 2px;
    background: var(--progress-track);
    position: relative;
  }

  .progress-fill {
    height: 2px;
    transition: width 0.4s ease;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: -2px;
    width: 4px;
    height: 6px;
    background: inherit;
    border-radius: 1px;
    opacity: 0.8;
  }

  .faction-detail {
    display: none;
    background: var(--bg-detail);
    border-top: 1px solid var(--border);
    padding: 14px 16px 16px;
  }

  .faction-detail.open { display: block; }

  .steps-list { display: flex; flex-direction: column; gap: 2px; }

  .step-row {
    display: flex;
    gap: 12px;
    padding: 6px 10px;
    border-radius: 3px;
    transition: background 0.15s;
    align-items: flex-start;
  }

  .step-row:hover { background: rgba(180,150,90,0.04); }

  .step-row.current {
    background: rgba(180,150,90,0.07);
    border-left: 2px solid var(--gold-dim);
    padding-left: 8px;
  }

  .step-n {
    font-family: var(--font-display);
    font-size: 11px;
    color: var(--text-muted);
    min-width: 16px;
    flex-shrink: 0;
    padding-top: 2px;
  }

  .step-row.current .step-n { color: var(--gold); }

  .step-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.55;
  }

  .step-row.current .step-desc { color: var(--text-primary); }

  .step-row.past .step-n,
  .step-row.past .step-desc {
    opacity: 0.35;
    text-decoration: line-through;
    text-decoration-color: var(--text-muted);
  }

  /* ENDGAME BADGE */
  .endgame-badge {
    display: inline-block;
    font-family: var(--font-display);
    font-size: 8px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 2px;
    margin-left: 8px;
    vertical-align: middle;
  }

  .endgame-badge.crisis { background: rgba(139,42,42,0.3); color: #e88; border: 1px solid rgba(200,60,60,0.3); }
  .endgame-badge.victory { background: rgba(80,140,60,0.2); color: #8c8; border: 1px solid rgba(80,180,60,0.3); }

  /* FOOTER */
  footer {
    margin-top: 3rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .reset-btn {
    font-size: 11px;
    font-family: var(--font-display);
    letter-spacing: 0.08em;
    color: var(--text-muted);
    background: none;
    border: 1px solid rgba(180,150,90,0.1);
    padding: 4px 12px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .reset-btn:hover { color: var(--red-bright); border-color: rgba(200,60,60,0.3); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: rgba(180,150,90,0.2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(180,150,90,0.35); }

  @media (max-width: 500px) {
    .fear-card { flex-wrap: wrap; }
    .fear-pips { order: 3; width: 100%; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-eyebrow">Campaign Tracker</div>
    <h1>Five Banners Burning</h1>
    <div class="header-sub">Session reference — factions &amp; fear</div>
  </header>

  <div class="fear-section">
    <div class="section-label">Fear</div>
    <div class="fear-card">
      <div class="fear-left">
        <div class="fear-title">Fear Pool</div>
        <div class="fear-value-display">
          <div class="fear-number" id="fearNumber">0</div>
          <div class="fear-denom">/12</div>
        </div>
      </div>
      <div class="fear-pips" id="fearPips"></div>
      <div class="fear-btns">
        <button class="ctrl-btn" onclick="adjustFear(1)" title="Add fear">+</button>
        <button class="ctrl-btn" onclick="adjustFear(-1)" title="Remove fear">−</button>
      </div>
    </div>
  </div>

  <div class="factions-section">
    <div class="section-label">Faction Countdowns</div>
    <div class="factions-list" id="factionsList"></div>
  </div>

  <footer>
    <span id="lastSaved">State saved locally</span>
    <button class="reset-btn" onclick="confirmReset()">Reset all</button>
  </footer>
</div>

      { n: 2, short: "Primordial vessels identified", detail: "Evelyn identifies the mortal vessels through which the primordial powers are operating — the Duke, Sirela, and others." },
      { n: 1, short: "Three deities unified — ritual ready", detail: "The three deities are unified in purpose. Evelyn is strong enough to attempt the trapping ritual — but needs help from the mortal side." },
      { n: 0, short: "Primordial powers trapped — the realm restored", detail: "The primordial powers of chaos are trapped. The Faerie realm is restored to sanctuary. The demonic threat is broken — if the party has done their part." },
    ]
  }
];

const STORAGE_KEY = "fivebannersburn_v1";

let state = { fear: 0, factions: {}, expanded: {} };
FACTIONS.forEach(f => { state.factions[f.id] = 8; state.expanded[f.id] = false; });

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      state.fear = parsed.fear ?? 0;
      FACTIONS.forEach(f => {
        if (parsed.factions && parsed.factions[f.id] !== undefined) state.factions[f.id] = parsed.factions[f.id];
        if (parsed.expanded && parsed.expanded[f.id] !== undefined) state.expanded[f.id] = parsed.expanded[f.id];
      });
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    const el = document.getElementById("lastSaved");
    if (el) {
      const now = new Date();
      el.textContent = "Saved " + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }
  } catch(e) {}
}

function adjustFear(delta) {
  state.fear = Math.max(0, Math.min(12, state.fear + delta));
  renderFear();
  saveState();
}

function setFear(val) {
  state.fear = state.fear === val ? val - 1 : val;
  state.fear = Math.max(0, Math.min(12, state.fear));
  renderFear();
  saveState();
}

function renderFear() {
  const v = state.fear;
  const num = document.getElementById("fearNumber");
  num.textContent = v;
  num.className = "fear-number" + (v >= 9 ? " danger" : "");
  const pips = document.getElementById("fearPips");
  pips.innerHTML = "";
  for (let i = 0; i < 12; i++) {
    const pip = document.createElement("div");
    const filled = i < v;
    const danger = filled && v >= 9;
    pip.className = "fear-pip" + (danger ? " danger-fill" : filled ? " filled" : "") + (i === 8 ? " fear-pip-9" : "");
    pip.title = "Set fear to " + (i + 1);
    pip.onclick = () => setFear(i + 1);
    pips.appendChild(pip);
  }
}

function adjustStep(id, delta, e) {
  e.stopPropagation();
  state.factions[id] = Math.max(0, Math.min(8, state.factions[id] + delta));
  updateFactionCard(id);
  saveState();
}

function toggleExpand(id) {
  state.expanded[id] = !state.expanded[id];
  const detail = document.getElementById("detail-" + id);
  const chevron = document.getElementById("chevron-" + id);
  if (detail) detail.classList.toggle("open", state.expanded[id]);
  if (chevron) chevron.classList.toggle("open", state.expanded[id]);
  saveState();
}

function updateFactionCard(id) {
  const faction = FACTIONS.find(f => f.id === id);
  const step = state.factions[id];
  const stepData = faction.steps.find(s => s.n === step);
  const pct = ((8 - step) / 8) * 100;

  const card = document.getElementById("card-" + id);
  if (!card) return;

  card.querySelector(".faction-short").textContent = stepData.short;
  card.querySelector(".step-num-display").textContent = step;
  const bar = card.querySelector(".progress-fill");
  bar.style.width = pct + "%";

  const list = card.querySelector(".steps-list");
  list.innerHTML = buildStepsHtml(faction, step);
}

function buildStepsHtml(faction, currentStep) {
  return faction.steps.map(s => {
    let cls = "step-row";
    if (s.n === currentStep) cls += " current";
    else if (s.n > currentStep) cls += " past";
    return `<div class="${cls}">
      <span class="step-n">${s.n}</span>
      <span class="step-desc">${s.detail}</span>
    </div>`;
  }).join("");
}

function buildFactionCard(faction) {
  const step = state.factions[faction.id];
  const stepData = faction.steps.find(s => s.n === step);
  const pct = ((8 - step) / 8) * 100;
  const isExpanded = state.expanded[faction.id];

  const card = document.createElement("div");
  card.className = "faction-card";
  card.id = "card-" + faction.id;

  card.innerHTML = `
    <div class="faction-header" onclick="toggleExpand('${faction.id}')">
      <div class="faction-sigil" style="background:${faction.color}"></div>
      <div class="faction-main">
        <div class="faction-name">${faction.name}</div>
        <div class="faction-short">${stepData.short}</div>
      </div>
      <div class="faction-right">
        <div class="step-counter">
          <button class="step-ctrl" onclick="adjustStep('${faction.id}', 1, event)" title="Walk back">+</button>
          <div>
            <div class="step-num-display">${step}</div>
            <div class="step-of">/ 8</div>
          </div>
          <button class="step-ctrl" onclick="adjustStep('${faction.id}', -1, event)" title="Advance">−</button>
        </div>
        <div class="expand-toggle${isExpanded ? ' open' : ''}" id="chevron-${faction.id}">▾</div>
      </div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" style="width:${pct}%; background:${faction.color}"></div>
    </div>
    <div class="faction-detail${isExpanded ? ' open' : ''}" id="detail-${faction.id}">
      <div class="steps-list">${buildStepsHtml(faction, step)}</div>
    </div>
  `;

  return card;
}

function confirmReset() {
  if (confirm("Reset all trackers to starting position?")) {
    state.fear = 0;
    FACTIONS.forEach(f => { state.factions[f.id] = 8; });
    renderFear();
    FACTIONS.forEach(f => updateFactionCard(f.id));
    saveState();
  }
}

function init() {
  loadState();
  renderFear();
  const list = document.getElementById("factionsList");
  FACTIONS.forEach(f => list.appendChild(buildFactionCard(f)));
}

init();
</script>
</body>
</html>
